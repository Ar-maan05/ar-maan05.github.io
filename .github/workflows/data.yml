name: Refresh live data

# Rebuilds data/activity.json, data/stats.json, and data/diffs.json from
# GitHub + pepy + PyPI, then bakes data-bake values into index.html and commits
# everything that changed. Nothing on the page depends on a third-party API at
# view time (§11 v1.1). Uses the default GITHUB_TOKEN (authenticated, so no
# meaningful rate limits).

on:
  schedule:
    - cron: "0 6 * * *"      # daily, 06:00 UTC
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "data/curated.json"
      - "scripts/build-data.mjs"
      - ".github/workflows/data.yml"

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/build-data.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/activity.json data/stats.json data/diffs.json index.html
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore(data): refresh live PR states, downloads, version and diff lines"
            git push
          fi
